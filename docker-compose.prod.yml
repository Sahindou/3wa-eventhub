services:
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - postgres_default
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - postgres_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: abdallah714/eventhub-backend:latest      
    container_name: backend
    restart: always
    networks:
      - postgres_default
    environment:
      PORT: 8000
      NODE_ENV: production
      DATABASE_URL: postgresql://ifrit:seigneurdestenebres@postgres:5432/db_eventhub
      MONGODB_URI: mongodb://mongo:27017/evenhub-analytics
      JWT_SECRET: dyhsbfijemzgr5gh6zerh4r5g41z65er4gh16zerh4re5g4e6r5h4e5r4he5r4he4rh6e5
      APP_NAME: EVENTHUB
      ORIGIN: https://eventhub.ifrit.cloud
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: abdallah714/eventhub-frontend:latest
    container_name: frontend
    restart: always
    networks:
      - postgres_default
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - postgres_default
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:

networks:
  postgres_default:
    external: true
