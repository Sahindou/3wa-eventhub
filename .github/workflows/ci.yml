name: CI 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout      # récuperer le code
        uses: actions/checkout@v4
      - name: Setup Node    # installer node
        uses: actions/setup-node@v4
        with:
          node-version: 25
      - name: Install pnpm  # installer pnpm
        run: npm install -g pnpm

      - name: Install deps  # installer les dépendances
        run: pnpm install

      - name: Run tests
        run: |
          pnpm --filter @eventhub/backend run test
          pnpm --filter @eventhub/frontend run test